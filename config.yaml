# Keymap Helper Configuration
# Customize which utilities to include and their config paths

dotfiles_dir: "~/dotfiles"

utilities:
  # Window Manager & Desktop
  - name: "i3"
    display_name: "i3 Window Manager"
    config_path: "~/dotfiles/i3/config"
    parser: "i3"
    enabled: true

  # Terminal & Multiplexers
  - name: "tmux"
    display_name: "tmux"
    parser: "static"
    enabled: true

  - name: "alacritty"
    display_name: "Alacritty Terminal"
    config_path: "~/dotfiles/alacritty/alacritty.toml"
    parser: "alacritty"
    enabled: true

  # Editors
  - name: "neovim"
    display_name: "Neovim"
    config_path: "~/dotfiles/nvim"
    parser: "neovim"
    enabled: true

  # Shell & CLI Tools (static keymaps)
  - name: "bash"
    display_name: "Bash Shell"
    parser: "static"
    enabled: true

  - name: "fzf"
    display_name: "fzf - Fuzzy Finder"
    parser: "static"
    enabled: true

  # Git Tools
  - name: "git"
    display_name: "Git"
    parser: "static"
    enabled: true

  - name: "lazygit"
    display_name: "LazyGit"
    config_path: "~/dotfiles/lazygit/config.yml"
    parser: "static"
    enabled: true

  # Docker Tools
  - name: "docker"
    display_name: "Docker CLI"
    parser: "static"
    enabled: true

  - name: "lazydocker"
    display_name: "LazyDocker"
    config_path: "~/dotfiles/lazydocker/config.yml"
    parser: "static"
    enabled: true

  # System Monitoring
  - name: "htop"
    display_name: "htop"
    parser: "static"
    enabled: true

  - name: "btop"
    display_name: "btop"
    parser: "static"
    enabled: true

  # Text Viewing
  - name: "less"
    display_name: "less"
    parser: "static"
    enabled: true

  # Build Tools
  - name: "make"
    display_name: "GNU Make"
    parser: "static"
    enabled: true

# Display preferences
display:
  category_separator: "━━━"
  max_description_length: 60
  
# fzf options
fzf:
  height: "90%"
  layout: "reverse"
  border: "rounded"
  preview_window: "right:50%"
  color_scheme: "dark"
