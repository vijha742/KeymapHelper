# Static Keymap Database
# Keymaps for tools without parseable configs

bash:
  - category: "Navigation"
    keymaps:
      - key: "Ctrl+A"
        description: "Move to beginning of line"
      - key: "Ctrl+E"
        description: "Move to end of line"
      - key: "Ctrl+B / Left"
        description: "Move back one character"
      - key: "Ctrl+F / Right"
        description: "Move forward one character"
      - key: "Alt+B"
        description: "Move back one word"
      - key: "Alt+F"
        description: "Move forward one word"

  - category: "Editing"
    keymaps:
      - key: "Ctrl+D"
        description: "Delete character under cursor"
      - key: "Ctrl+H / Backspace"
        description: "Delete character before cursor"
      - key: "Ctrl+W"
        description: "Delete word before cursor"
      - key: "Ctrl+U"
        description: "Delete from cursor to beginning of line"
      - key: "Ctrl+K"
        description: "Delete from cursor to end of line"
      - key: "Ctrl+Y"
        description: "Paste last deleted text"
      - key: "Alt+D"
        description: "Delete word after cursor"
      - key: "Alt+Backspace"
        description: "Delete word before cursor"
      - key: "Ctrl+T"
        description: "Transpose characters"

  - category: "History"
    keymaps:
      - key: "Ctrl+R"
        description: "Reverse search history"
      - key: "Ctrl+G"
        description: "Escape from history search"
      - key: "Ctrl+P / Up"
        description: "Previous command in history"
      - key: "Ctrl+N / Down"
        description: "Next command in history"
      - key: "Alt+."
        description: "Insert last argument of previous command"

  - category: "Control"
    keymaps:
      - key: "Ctrl+L"
        description: "Clear screen"
      - key: "Ctrl+C"
        description: "Cancel current command"
      - key: "Ctrl+Z"
        description: "Suspend current process"
      - key: "Ctrl+D"
        description: "Exit shell (on empty line)"
      - key: "Tab"
        description: "Auto-complete"
      - key: "Tab Tab"
        description: "Show all completions"

fzf:
  - category: "Navigation"
    keymaps:
      - key: "Ctrl+J / Ctrl+N / Down"
        description: "Move cursor down"
      - key: "Ctrl+K / Ctrl+P / Up"
        description: "Move cursor up"
      - key: "PageDown"
        description: "Scroll preview down"
      - key: "PageUp"
        description: "Scroll preview up"

  - category: "Selection"
    keymaps:
      - key: "Enter"
        description: "Select and exit"
      - key: "Tab"
        description: "Mark/unmark item"
      - key: "Shift+Tab"
        description: "Mark/unmark item (reverse)"
      - key: "Ctrl+A"
        description: "Select all"
      - key: "Ctrl+D"
        description: "Deselect all"
      - key: "Ctrl+T"
        description: "Toggle selection"

  - category: "Search"
    keymaps:
      - key: "Ctrl+R"
        description: "Toggle sort"
      - key: "Alt+C"
        description: "Clear query"
      - key: "Ctrl+/"
        description: "Toggle preview window"

  - category: "Control"
    keymaps:
      - key: "Esc / Ctrl+C / Ctrl+G"
        description: "Exit"
      - key: "Ctrl+L"
        description: "Clear screen"

git:
  - category: "Basic Commands"
    keymaps:
      - key: "git status"
        description: "Show working tree status"
      - key: "git add <file>"
        description: "Add file to staging"
      - key: "git add ."
        description: "Add all changes to staging"
      - key: "git commit -m"
        description: "Commit staged changes"
      - key: "git push"
        description: "Push commits to remote"
      - key: "git pull"
        description: "Fetch and merge from remote"

  - category: "Branching"
    keymaps:
      - key: "git branch"
        description: "List branches"
      - key: "git branch <name>"
        description: "Create new branch"
      - key: "git checkout <branch>"
        description: "Switch to branch"
      - key: "git checkout -b <name>"
        description: "Create and switch to branch"
      - key: "git merge <branch>"
        description: "Merge branch into current"
      - key: "git branch -d <name>"
        description: "Delete branch"

  - category: "History & Inspection"
    keymaps:
      - key: "git log"
        description: "Show commit history"
      - key: "git log --oneline"
        description: "Compact commit history"
      - key: "git diff"
        description: "Show unstaged changes"
      - key: "git diff --staged"
        description: "Show staged changes"
      - key: "git show <commit>"
        description: "Show commit details"

  - category: "Undo Changes"
    keymaps:
      - key: "git restore <file>"
        description: "Discard changes in working directory"
      - key: "git restore --staged <file>"
        description: "Unstage file"
      - key: "git reset HEAD~1"
        description: "Undo last commit (keep changes)"
      - key: "git reset --hard HEAD~1"
        description: "Undo last commit (discard changes)"
      - key: "git revert <commit>"
        description: "Create new commit that undoes changes"

lazygit:
  - category: "Navigation"
    keymaps:
      - key: "h/j/k/l"
        description: "Navigate panels/items"
      - key: "1-5"
        description: "Switch to panel (files/branches/commits/stash/log)"
      - key: "["
        description: "Previous tab"
      - key: "]"
        description: "Next tab"

  - category: "Files"
    keymaps:
      - key: "Space"
        description: "Stage/unstage file"
      - key: "a"
        description: "Stage/unstage all"
      - key: "c"
        description: "Commit changes"
      - key: "d"
        description: "View delete options"
      - key: "e"
        description: "Edit file"

  - category: "Commits"
    keymaps:
      - key: "p"
        description: "Push"
      - key: "P"
        description: "Pull"
      - key: "r"
        description: "Rebase"
      - key: "s"
        description: "Squash commits"

  - category: "Control"
    keymaps:
      - key: "q"
        description: "Quit/close panel"
      - key: "x"
        description: "Show command menu"
      - key: "?"
        description: "Show help"

docker:
  - category: "Container Management"
    keymaps:
      - key: "docker ps"
        description: "List running containers"
      - key: "docker ps -a"
        description: "List all containers"
      - key: "docker start <name>"
        description: "Start container"
      - key: "docker stop <name>"
        description: "Stop container"
      - key: "docker restart <name>"
        description: "Restart container"
      - key: "docker rm <name>"
        description: "Remove container"
      - key: "docker exec -it <name> bash"
        description: "Execute bash in container"

  - category: "Image Management"
    keymaps:
      - key: "docker images"
        description: "List images"
      - key: "docker pull <image>"
        description: "Pull image from registry"
      - key: "docker build -t <tag> ."
        description: "Build image from Dockerfile"
      - key: "docker rmi <image>"
        description: "Remove image"

  - category: "Logs & Inspection"
    keymaps:
      - key: "docker logs <name>"
        description: "View container logs"
      - key: "docker logs -f <name>"
        description: "Follow container logs"
      - key: "docker inspect <name>"
        description: "Inspect container details"

lazydocker:
  - category: "Navigation"
    keymaps:
      - key: "h/j/k/l"
        description: "Navigate panels/items"
      - key: "1-4"
        description: "Switch panel (containers/images/volumes/networks)"
      - key: "Tab"
        description: "Next panel"
      - key: "Shift+Tab"
        description: "Previous panel"

  - category: "Actions"
    keymaps:
      - key: "d"
        description: "Remove selected item"
      - key: "s"
        description: "Stop container"
      - key: "r"
        description: "Restart container"
      - key: "p"
        description: "Pause/unpause container"
      - key: "e"
        description: "Execute shell in container"

  - category: "Control"
    keymaps:
      - key: "q"
        description: "Quit"
      - key: "x"
        description: "Show menu"
      - key: "?"
        description: "Show help"

htop:
  - category: "Navigation"
    keymaps:
      - key: "Up/Down"
        description: "Select process"
      - key: "Left/Right"
        description: "Scroll columns"
      - key: "PgUp/PgDn"
        description: "Scroll page"
      - key: "Home/End"
        description: "First/last process"

  - category: "Sorting"
    keymaps:
      - key: "P"
        description: "Sort by CPU"
      - key: "M"
        description: "Sort by memory"
      - key: "T"
        description: "Sort by time"
      - key: "F6"
        description: "Sort menu"

  - category: "Process Control"
    keymaps:
      - key: "F9 / k"
        description: "Kill process"
      - key: "Space"
        description: "Tag process"
      - key: "U"
        description: "Show user's processes"
      - key: "t"
        description: "Tree view"
      - key: "H"
        description: "Show/hide threads"

  - category: "Control"
    keymaps:
      - key: "F1 / h / ?"
        description: "Help"
      - key: "F10 / q"
        description: "Quit"
      - key: "F5"
        description: "Refresh"

btop:
  - category: "Navigation"
    keymaps:
      - key: "Up/Down"
        description: "Navigate list"
      - key: "PgUp/PgDn"
        description: "Page up/down"
      - key: "Home/End"
        description: "First/last item"

  - category: "Filtering"
    keymaps:
      - key: "f"
        description: "Filter processes"
      - key: "e"
        description: "Clear filter"

  - category: "Process Control"
    keymaps:
      - key: "k"
        description: "Kill selected process"
      - key: "t"
        description: "Toggle tree view"
      - key: "r"
        description: "Reverse sort order"

  - category: "View Control"
    keymaps:
      - key: "m"
        description: "Show menu"
      - key: "o"
        description: "Options"
      - key: "h"
        description: "Help"
      - key: "q"
        description: "Quit"

less:
  - category: "Navigation"
    keymaps:
      - key: "j / Down / Enter"
        description: "Scroll down one line"
      - key: "k / Up"
        description: "Scroll up one line"
      - key: "Space / PageDown"
        description: "Scroll down one page"
      - key: "b / PageUp"
        description: "Scroll up one page"
      - key: "d"
        description: "Scroll down half page"
      - key: "u"
        description: "Scroll up half page"
      - key: "g / Home"
        description: "Go to first line"
      - key: "G / End"
        description: "Go to last line"
      - key: "<number>G"
        description: "Go to line number"

  - category: "Search"
    keymaps:
      - key: "/<pattern>"
        description: "Search forward"
      - key: "?<pattern>"
        description: "Search backward"
      - key: "n"
        description: "Next match"
      - key: "N"
        description: "Previous match"
      - key: "&<pattern>"
        description: "Display only matching lines"

  - category: "Control"
    keymaps:
      - key: "q"
        description: "Quit"
      - key: "h"
        description: "Help"
      - key: "F"
        description: "Follow mode (like tail -f)"
      - key: "="
        description: "Show file info"
      - key: "v"
        description: "Open in $EDITOR"

make:
  - category: "Basic Commands"
    keymaps:
      - key: "make"
        description: "Build default target"
      - key: "make <target>"
        description: "Build specific target"
      - key: "make all"
        description: "Build all targets"
      - key: "make clean"
        description: "Clean build artifacts"
      - key: "make install"
        description: "Install built files"

  - category: "Options"
    keymaps:
      - key: "make -n"
        description: "Dry run (show commands)"
      - key: "make -j<N>"
        description: "Parallel build (N jobs)"
      - key: "make -B"
        description: "Force rebuild all"
      - key: "make -f <file>"
        description: "Use specific Makefile"
tmux:
  - category: "Sessions"
    keymaps:
      - key: "Ctrl+A $"
        description: "Rename current session"
      - key: "Ctrl+A s"
        description: "Choose a session from a list"
      - key: "Ctrl+A d"
        description: "Detach the current client"
      - key: "Ctrl+A D"
        description: "Choose and detach a client from a list"
      - key: "Ctrl+A ("
        description: "Switch to previous client"
      - key: "Ctrl+A )"
        description: "Switch to next client"
      - key: "Ctrl+A L"
        description: "Switch to the last client"
      - key: "Ctrl+A Ctrl+Z"
        description: "Suspend the current client"

  - category: "Windows"
    keymaps:
      - key: "Ctrl+A c"
        description: "Create new window"
      - key: "Ctrl+A &"
        description: "Kill current window"
      - key: "Ctrl+A ,"
        description: "Rename current window"
      - key: "Ctrl+A ."
        description: "Move the current window"
      - key: "Ctrl+A '"
        description: "Prompt for window index to select"
      - key: "Ctrl+A 0-9"
        description: "Select window by number"
      - key: "Ctrl+A n"
        description: "Select the next window"
      - key: "Ctrl+A p"
        description: "Select the previous window"
      - key: "Ctrl+A w"
        description: "Choose a window from a list"
      - key: "Ctrl+A i"
        description: "Display window information"
      - key: "Ctrl+A M-N"
        description: "Select the next window with an alert"
      - key: "Ctrl+A M-P"
        description: "Select the previous window with an alert"

  - category: "Panes"
    keymaps:
      - key: "Ctrl+A %"
        description: "Split pane horizontally"
      - key: "Ctrl+A \""
        description: "Split pane vertically"
      - key: "Ctrl+A !"
        description: "Break pane to a new window"
      - key: "Ctrl+A x"
        description: "Kill the active pane"
      - key: "Ctrl+A o"
        description: "Select the next pane"
      - key: "Ctrl+A ;"
        description: "Move to the previously active pane"
      - key: "Ctrl+A q"
        description: "Display pane numbers"
      - key: "Ctrl+A z"
        description: "Zoom the active pane"
      - key: "Ctrl+A {"
        description: "Swap the active pane with the pane above"
      - key: "Ctrl+A }"
        description: "Swap the active pane with the pane below"
      - key: "Ctrl+A Ctrl+O"
        description: "Rotate through the panes"
      - key: "Ctrl+A M-O"
        description: "Rotate through the panes in reverse"
      - key: "Ctrl+A f"
        description: "Search for a pane"
      - key: "Ctrl+A m"
        description: "Toggle the marked pane"
      - key: "Ctrl+A M"
        description: "Clear the marked pane"

  - category: "Pane Navigation"
    keymaps:
      - key: "Ctrl+A Up"
        description: "Select the pane above the active pane"
      - key: "Ctrl+A Down"
        description: "Select the pane below the active pane"
      - key: "Ctrl+A Left"
        description: "Select the pane to the left of the active pane"
      - key: "Ctrl+A Right"
        description: "Select the pane to the right of the active pane"

  - category: "Pane Resizing"
    keymaps:
      - key: "Ctrl+A Ctrl+Up"
        description: "Resize the pane up"
      - key: "Ctrl+A Ctrl+Down"
        description: "Resize the pane down"
      - key: "Ctrl+A Ctrl+Left"
        description: "Resize the pane left"
      - key: "Ctrl+A Ctrl+Right"
        description: "Resize the pane right"
      - key: "Ctrl+A M-Up"
        description: "Resize the pane up by 5"
      - key: "Ctrl+A M-Down"
        description: "Resize the pane down by 5"
      - key: "Ctrl+A M-Left"
        description: "Resize the pane left by 5"
      - key: "Ctrl+A M-Right"
        description: "Resize the pane right by 5"

  - category: "Layouts"
    keymaps:
      - key: "Ctrl+A Space"
        description: "Select next layout"
      - key: "Ctrl+A E"
        description: "Spread panes out evenly"
      - key: "Ctrl+A M-1"
        description: "Set the even-horizontal layout"
      - key: "Ctrl+A M-2"
        description: "Set the even-vertical layout"
      - key: "Ctrl+A M-3"
        description: "Set the main-horizontal layout"
      - key: "Ctrl+A M-4"
        description: "Set the main-vertical layout"
      - key: "Ctrl+A M-5"
        description: "Select the tiled layout"

  - category: "Copy Mode"
    keymaps:
      - key: "Ctrl+A ["
        description: "Enter copy mode"
      - key: "Ctrl+A ]"
        description: "Paste the most recent paste buffer"
      - key: "Ctrl+A #"
        description: "List all paste buffers"
      - key: "Ctrl+A ="
        description: "Choose a paste buffer from a list"
      - key: "Ctrl+A PageUp"
        description: "Enter copy mode and scroll up"

  - category: "View Control"
    keymaps:
      - key: "Ctrl+A Shift+Up"
        description: "Move the visible part of the window up"
      - key: "Ctrl+A Shift+Down"
        description: "Move the visible part of the window down"
      - key: "Ctrl+A Shift+Left"
        description: "Move the visible part of the window left"
      - key: "Ctrl+A Shift+Right"
        description: "Move the visible part of the window right"
      - key: "Ctrl+A Delete"
        description: "Reset so the visible part of the window follows the cursor"

  - category: "Misc"
    keymaps:
      - key: "Ctrl+A :"
        description: "Prompt for a command"
      - key: "Ctrl+A ?"
        description: "List key bindings"
      - key: "Ctrl+A /"
        description: "Describe key binding"
      - key: "Ctrl+A C"
        description: "Customize options"
      - key: "Ctrl+A t"
        description: "Show a clock"
      - key: "Ctrl+A ~"
        description: "Show messages"
